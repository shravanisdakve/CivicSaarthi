steps:
  # 1. Install dependencies
  - name: "node:20"
    entrypoint: "npm"
    args: ["install"]

  # 2. Run automated tests (Logic, Neutrality, Architecture)
  - name: "node:20"
    entrypoint: "npm"
    args: ["test"]

  # 3. Production build (Vite frontend)
  # This step is now redundant as docker build will run npm run build inside the container
  # - name: "gcr.io/cloud-builders/npm"
  #   args: ["run", "build"]

  # 3. Explicitly Build Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker build \
          -t gcr.io/$PROJECT_ID/civicsaarthi:latest \
          --build-arg VITE_GOOGLE_MAPS_API_KEY=$$VITE_GOOGLE_MAPS_API_KEY \
          --build-arg VITE_FIREBASE_API_KEY=$$VITE_FIREBASE_API_KEY \
          --build-arg VITE_FIREBASE_AUTH_DOMAIN=$$VITE_FIREBASE_AUTH_DOMAIN \
          --build-arg VITE_FIREBASE_PROJECT_ID=$$VITE_FIREBASE_PROJECT_ID \
          --build-arg VITE_FIREBASE_STORAGE_BUCKET=$$VITE_FIREBASE_STORAGE_BUCKET \
          --build-arg VITE_FIREBASE_MESSAGING_SENDER_ID=$$VITE_FIREBASE_MESSAGING_SENDER_ID \
          --build-arg VITE_FIREBASE_APP_ID=$$VITE_FIREBASE_APP_ID \
          --build-arg VITE_GEMINI_API_KEY=$$VITE_GEMINI_API_KEY \
          .
    secretEnv: ['VITE_GOOGLE_MAPS_API_KEY', 'VITE_FIREBASE_API_KEY', 'VITE_FIREBASE_AUTH_DOMAIN', 'VITE_FIREBASE_PROJECT_ID', 'VITE_FIREBASE_STORAGE_BUCKET', 'VITE_FIREBASE_MESSAGING_SENDER_ID', 'VITE_FIREBASE_APP_ID', 'VITE_GEMINI_API_KEY']

  # 4. Deploy to Cloud Run
  # Note: This step assumes the Cloud Build service account has 'Cloud Run Admin' and 'Service Account User' roles.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      [
        "run", "deploy", "civicsaarthi",
        "--image", "gcr.io/$PROJECT_ID/civicsaarthi:latest", # Use the built image
        "--region", "asia-south1",
        "--allow-unauthenticated",
        # Sensitive variables should be managed as secrets in Google Secret Manager.
        # Format: --set-secrets=ENV_VAR_NAME=SECRET_NAME:VERSION
        "--set-secrets", "GEMINI_API_KEY=gemini-api-key:latest", # Backend GEMINI_API_KEY
        
        # Non-sensitive variables or those managed differently.
        # For GOOGLE_APPLICATION_CREDENTIALS in Cloud Run, it's often best to grant the
        # Cloud Run service account the necessary IAM roles (e.g., roles/cloudnatuarallanguage.viewer)
        # instead of passing a service account key file.
        "--set-env-vars", "GEMINI_MODEL=gemini-1.5-flash", # Example: Can be a secret if dynamic
        "--set-env-vars", "CALENDAR_REDIRECT_URI=http://localhost:8080/api/calendar/oauth2callback"
      ]

timeout: "1200s"
options:
  logging: CLOUD_LOGGING_ONLY

availableSecrets:
  secretManager:
  - versionName: projects/$PROJECT_ID/secrets/gemini-api-key/versions/latest
    env: 'VITE_GEMINI_API_KEY'
  - versionName: projects/$PROJECT_ID/secrets/google-maps-api-key/versions/latest
    env: 'VITE_GOOGLE_MAPS_API_KEY'
  - versionName: projects/$PROJECT_ID/secrets/firebase-api-key/versions/latest
    env: 'VITE_FIREBASE_API_KEY'
  - versionName: projects/$PROJECT_ID/secrets/firebase-auth-domain/versions/latest
    env: 'VITE_FIREBASE_AUTH_DOMAIN'
  - versionName: projects/$PROJECT_ID/secrets/firebase-project-id/versions/latest
    env: 'VITE_FIREBASE_PROJECT_ID'
  - versionName: projects/$PROJECT_ID/secrets/firebase-storage-bucket/versions/latest
    env: 'VITE_FIREBASE_STORAGE_BUCKET'
  - versionName: projects/$PROJECT_ID/secrets/firebase-messaging-sender-id/versions/latest
    env: 'VITE_FIREBASE_MESSAGING_SENDER_ID'
  - versionName: projects/$PROJECT_ID/secrets/firebase-app-id/versions/latest
    env: 'VITE_FIREBASE_APP_ID'

